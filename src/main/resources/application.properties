# ============================================================
# Mantra Application Configuration
# ============================================================
spring.application.name=mantra-svc
server.port=${SERVER_PORT:9090}

# ============================================================
# MongoDB Configuration
# ============================================================
spring.data.mongodb.host=${MONGO_HOST:localhost}
spring.data.mongodb.port=${MONGO_PORT:27017}
spring.data.mongodb.database=${MONGO_DB:mantra_db}
spring.data.mongodb.auto-index-creation=true

# ============================================================
# JWT Configuration
# IMPORTANT: Override JWT_SECRET with a strong 32+ char secret
# ============================================================
app.jwt.secret=${JWT_SECRET:MantraApp2026SecretKeyForDev_MustChange_32chars!}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================================
# CORS Configuration
# ============================================================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4300,http://localhost:4201,http://localhost:9090}

# ============================================================
# File Upload / Multipart (WebFlux codec limits)
# ============================================================
spring.codec.max-in-memory-size=50MB
spring.webflux.multipart.max-file-size=50MB
spring.webflux.multipart.max-request-size=150MB

# ============================================================
# Logging
# ============================================================
logging.level.com.rc1.mantra_svc=DEBUG

# ============================================================
# News Ticker — Google News RSS (no API key required)
# ============================================================

# ============================================================
# File Upload Configuration
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:20MB}
app.upload.dir=${UPLOAD_DIR:./uploads}

# ============================================================
# Chat / WebSocket Configuration
# ============================================================
app.websocket.allowed-origins=${WS_ORIGINS:http://localhost:4300}
logging.level.org.springframework.security=WARN
logging.level.org.springframework.data.mongodb=DEBUG
